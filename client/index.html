<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>AutoReview</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script>
      (function(){
        var stored = localStorage.getItem('theme');
        var dark = stored !== 'light';
        if (dark) document.documentElement.classList.add('dark');
      })();
    </script>
    <style>
      #app-loader {
        position: fixed;
        inset: 0;
        z-index: 99999;
        background: #ffffff;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 24px;
        transition: opacity 0.45s cubic-bezier(0.4, 0, 0.2, 1),
                    visibility 0.45s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .dark #app-loader {
        background: #0a0a0a;
      }
      #app-loader[data-hiding] {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      #app-loader-icon {
        animation: loader-breathe 2s ease-in-out infinite;
        filter: drop-shadow(0 8px 24px rgba(99, 102, 241, 0.35));
      }
      #app-loader-label {
        font-family: Inter, system-ui, -apple-system, sans-serif;
        font-size: 22px;
        font-weight: 700;
        letter-spacing: -0.5px;
        color: #0a0a0a;
        animation: loader-fadein 0.6s ease both;
      }
      .dark #app-loader-label {
        color: #fafafa;
      }
      #app-loader-label span {
        color: #6366f1;
      }
      #app-loader-dots {
        display: flex;
        gap: 6px;
        animation: loader-fadein 0.8s ease both;
      }
      #app-loader-dots span {
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: #6366f1;
        animation: loader-dot 1.4s ease-in-out infinite;
      }
      #app-loader-dots span:nth-child(2) { animation-delay: 0.2s; }
      #app-loader-dots span:nth-child(3) { animation-delay: 0.4s; }

      @keyframes loader-breathe {
        0%, 100% { transform: scale(1);    opacity: 1; }
        50%       { transform: scale(0.93); opacity: 0.8; }
      }
      @keyframes loader-fadein {
        from { opacity: 0; transform: translateY(6px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes loader-dot {
        0%, 80%, 100% { transform: scale(0.6); opacity: 0.3; }
        40%           { transform: scale(1);   opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div id="app-loader" aria-hidden="true">
      <div id="app-loader-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none" width="72" height="72">
          <defs>
            <linearGradient id="loader-bg" x1="0" y1="0" x2="32" y2="32">
              <stop offset="0" stop-color="#6366f1"/>
              <stop offset="1" stop-color="#4338ca"/>
            </linearGradient>
          </defs>
          <rect width="32" height="32" rx="8" fill="url(#loader-bg)"/>
          <path d="M10 9L5 16L10 23" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
          <path d="M22 9L27 16L22 23" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
          <path d="M13 16L15.5 18.5L20 13" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div id="app-loader-label">Auto<span>Review</span></div>
      <div id="app-loader-dots">
        <span></span><span></span><span></span>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
