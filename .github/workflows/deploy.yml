name: Deploy to Cloud Run

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: arun-prabhakar

      - name: Build and push
        run: |
          gcloud builds submit --tag gcr.io/arun-prabhakar/autoreview

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy autoreview \
            --image gcr.io/arun-prabhakar/autoreview \
            --region us-central1 \
            --platform managed \
            --min-instances 0 \
            --max-instances 3 \
            --memory 256Mi \
            --cpu 1 \
            --port 3001 \
            --allow-unauthenticated \
            --set-env-vars "NODE_ENV=production" \
            --set-env-vars "DATABASE_URL=${{ secrets.DATABASE_URL }}" \
            --set-env-vars "ENCRYPTION_KEY=${{ secrets.ENCRYPTION_KEY }}" \
            --set-env-vars "JWT_SECRET=${{ secrets.JWT_SECRET }}" \
            --set-env-vars "CRON_SECRET=${{ secrets.CRON_SECRET }}"
